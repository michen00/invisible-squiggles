---
name: greet new contributors
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: detect bot author
        id: bot-author-check
        uses: ./.github/actions/detect-bot-author
      # Greet genuine newcomers only: the bot guard handles automation;
      # author_association skips maintainers and returning contributors,
      # whose first-interaction count is unreliable during PR bursts.
      - name: greet first interactions
        if: >-
          steps.bot-author-check.outputs.is-bot == 'false' &&
          !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'),
          github.event.pull_request.author_association ||
          github.event.issue.author_association)
        uses: actions/first-interaction@v3
        with:
          issue_message: |
            🎉 Welcome to the `invisible-squiggles` community! 🎉

            Thank you for your contribution! We appreciate your time and effort in submitting this issue. A maintainer will review it soon. If you have any questions, feel free to ask!

            Thank you for your cooperation 🙏
          pr_message: |
            🎉 Welcome to the `invisible-squiggles` community! 🎉

            Thank you for your contribution! We appreciate your time and effort in submitting this pull request. A maintainer will review it soon. If you have any questions, feel free to ask!

            Thank you for your cooperation 🙏
